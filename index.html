<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>З 8 Березня!</title>
    <style>
        body {
            background: black;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
        }
        canvas { position: absolute; top: 0; left: 0; }
        
        /* Заголовок у центрі (білий, зникає миттєво) */
        #centerText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            color: white; 
            opacity: 0;
            transition: opacity 0.1s; /* Миттєве зникнення */
            text-align: center;
            pointer-events: none;
        }

        /* Блок для привітання (білий текст, під серцем у кутку) */
        #message {
            position: absolute;
            top: 160px; /* Позиція під зменшеним серцем */
            left: 30px;
            width: 450px;
            font-size: 18px;
            line-height: 1.6;
            color: white;
            white-space: pre-line;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="centerText">З 8 Березня! 🌸</div>
<div id="message"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hearts = [];
const heartCount = 300; 
let centerX = canvas.width / 2;
let centerY = canvas.height / 2;
let heartSize = 15; // Початковий великий розмір
let isFinished = false; // Чи додрукувався текст

const heartEmojis = ["❤️", "💖", "💝", "💕", "💗", "💓"];
let stage = 0; // 0 - хаос, 1 - центр, 2 - кут

// Створення частинок
for (let i = 0; i < heartCount; i++) {
    hearts.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 5,
        vy: (Math.random() - 0.5) * 5,
        targetAngle: (i / heartCount) * Math.PI * 2,
        emoji: "❤️"
    });
}

function getHeartPoint(angle, size) {
    const x = 16 * Math.pow(Math.sin(angle), 3);
    const y = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
    return { x: x * size, y: y * size };
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    hearts.forEach((h) => {
        if (stage === 0) {
            h.x += h.vx;
            h.y += h.vy;
            if (h.x < 0 || h.x > canvas.width) h.vx *= -1;
            if (h.y < 0 || h.y > canvas.height) h.vy *= -1;
        } else {
            const target = getHeartPoint(h.targetAngle, heartSize);
            const tx = centerX + target.x;
            const ty = centerY + target.y;
            
            // Плавний рух до цілі
            h.x += (tx - h.x) * 0.08;
            h.y += (ty - h.y) * 0.08;

            // Ефект переливання (поки текст не закінчився)
            if (stage >= 1 && !isFinished) {
                if (Math.random() > 0.9) {
                    h.emoji = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
                }
            } else if (isFinished) {
                h.emoji = "❤️"; // Зупиняємо на червоному
            }
        }
        
        ctx.font = `${heartSize + 4}px serif`;
        ctx.fillText(h.emoji, h.x, h.y);
    });

    requestAnimationFrame(animate);
}

animate();

// --- КЕРУВАННЯ ПОСЛІДОВНІСТЮ ---

// 1. Збираємо велике серце в центрі і показуємо текст
setTimeout(() => {
    stage = 1;
    document.getElementById("centerText").style.opacity = 1;
}, 1000);

// 2. Текст швидко зникає
setTimeout(() => {
    document.getElementById("centerText").style.opacity = 0;
}, 3000);

// 3. Серце зменшується і летить у верхній лівий кут
setTimeout(() => {
    stage = 2;
    centerX = 100;
    centerY = 80;
    heartSize = 8; // Зменшення розміру
}, 3500);

// 4. Починаємо друкувати основне привітання під серцем
setTimeout(typeText, 4500);

const textContent = `Сьогодні восьме березня! 
Це чудовий весняний день, і я бажаю тобі, щоб у твоєму житті все було прекрасно. 

Нехай лагідне сонце освітлює твій шлях не тільки сьогодні, а й кожного наступного дня. Будь щаслива, усміхнена і нехай кожен твій день буде схожий на свято! Вітаю! 🌸✨`;

let pos = 0;
function typeText() {
    if (pos < textContent.length) {
        document.getElementById("message").textContent += textContent[pos];
        pos++;
        setTimeout(typeText, 35);
    } else {
        isFinished = true; // Текст завершено — серце червоніє
    }
}
</script>

</body>
</html>
