<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>З 8 Березня!</title>
    <style>
        body {
            background: black;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        canvas { position: absolute; top: 0; left: 0; }
        #centerText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            color: #ff3366;
            opacity: 0;
            transition: opacity 1.5s;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 15px rgba(255, 51, 102, 0.6);
        }
        #message {
            position: absolute;
            top: 160px;
            left: 40px;
            width: 400px;
            font-size: 19px;
            line-height: 1.5;
            color: #ffccd5;
            white-space: pre-line;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="centerText">З 8 Березня! 🌸</div>
<div id="message"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hearts = [];
const heartCount = 280; // Кількість маленьких сердечок
let centerX = canvas.width / 2;
let centerY = canvas.height / 2;

// Стан анімації: 0 - хаос, 1 - збір у серце, 2 - рух у кут
let stage = 0; 

// Ініціалізація частинок
for (let i = 0; i < heartCount; i++) {
    hearts.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 3,
        vy: (Math.random() - 0.5) * 3,
        // Кожна частинка отримує свій кут для формування серця
        targetAngle: (i / heartCount) * Math.PI * 2 
    });
}

function getHeartPoint(angle, size) {
    // Математична формула серця
    const x = 16 * Math.pow(Math.sin(angle), 3);
    const y = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
    return { x: x * size, y: y * size };
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    hearts.forEach(h => {
        if (stage === 0) {
            // Хаотичний рух на початку
            h.x += h.vx;
            h.y += h.vy;
            if (h.x < 0 || h.x > canvas.width) h.vx *= -1;
            if (h.y < 0 || h.y > canvas.height) h.vy *= -1;
        } else {
            // Плавне тяжіння до форми серця (Interpolation)
            const target = getHeartPoint(h.targetAngle, 14);
            const tx = centerX + target.x;
            const ty = centerY + target.y;
            
            h.x += (tx - h.x) * 0.06;
            h.y += (ty - h.y) * 0.06;
        }
        
        ctx.font = "18px serif";
        ctx.fillText("❤️", h.x, h.y);
    });

    requestAnimationFrame(animate);
}

// Запуск послідовності
animate();

// 1. Починаємо збирати серце через 1.5 секунди
setTimeout(() => {
    stage = 1;
    document.getElementById("centerText").style.opacity = 1;
}, 1500);

// 2. Переміщуємо серце в кут через 4.5 секунди
setTimeout(() => {
    centerX = 120;
    centerY = 100;
    document.getElementById("centerText").style.opacity = 0;
}, 4500);

// 3. Починаємо друкувати текст, коли серце відпливло
setTimeout(typeText, 6000);

const text = `Сьогодні восьме березня! 
Це чудовий весняний день, і я бажаю тобі, щоб у твоєму житті все було прекрасно. 

Нехай лагідне сонце освітлює твій шлях не тільки сьогодні, а й кожного наступного дня. Будь щаслива, усміхнена і нехай кожен твій день буде схожий на свято! Вітаю! 🌸✨`;

let pos = 0;
function typeText() {
    if (pos < text.length) {
        document.getElementById("message").textContent += text[pos];
        pos++;
        // Швидкість друку: 40мс на символ
        setTimeout(typeText, 40);
    }
}

// Оновлення координат при зміні розміру вікна
window.onresize = () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    if (stage === 1) {
        centerX = canvas.width / 2;
        centerY = canvas.height / 2;
    }
};
</script>

</body>
</html>
