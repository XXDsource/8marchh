<!DOCTYPE html>
<html lang="uk">
<head>

    <title>З 8 Березня!</title>

        #centerText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8vw;
            color: white; 
            opacity: 0;
            transition: opacity 0.1s;
            text-align: center;
            pointer-events: none;
            width: 90%;
        }

        #message {
            position: absolute;

            left: 5%;
            right: 5%;
            font-size: 22px; /* Збільшений шрифт */
            line-height: 1.5;
            color: white;
            white-space: pre-line;
        }

        @media (min-width: 768px) {
            #message {
                font-size: 26px; /* Ще більший шрифт для ПК */
                width: 700px;
                left: 60px;
            }
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="centerText">З 8 Березня! 🌸</div>
<div id="message"></div>
