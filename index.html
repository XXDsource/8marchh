<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>З 8 Березня!</title>
    <style>
        body {
            background: black;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
        }
        canvas { position: absolute; top: 0; left: 0; }
        
        #centerText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8vw;
            color: white; 
            opacity: 0;
            transition: opacity 0.1s;
            text-align: center;
            pointer-events: none;
            width: 90%;
            z-index: 10;
        }

        #message {
            position: absolute;
            top: 260px; /* Опущено нижче, щоб не з'єднувалось із серцем */
            left: 7%;
            right: 7%;
            font-size: 22px; 
            line-height: 1.5;
            color: white;
            white-space: pre-line;
            z-index: 5;
        }

        @media (min-width: 768px) {
            #message {
                font-size: 26px;
                width: 750px;
                left: 60px;
                top: 280px;
            }
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="centerText">З 8 Березня! 🌸</div>
<div id="message"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hearts = [];
let heartCount = 350; 
let centerX = canvas.width / 2;
let centerY = canvas.height / 2;
let heartSize = 15; 
let isTypingStarted = false;

const heartEmojis = ["❤️", "💖", "💝", "💕", "💗", "💓"];
let stage = 0; 

function createHeartPart() {
    return {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 5,
        vy: (Math.random() - 0.5) * 5,
        targetAngle: Math.random() * Math.PI * 2,
        emoji: heartEmojis[Math.floor(Math.random() * heartEmojis.length)]
    };
}

for (let i = 0; i < heartCount; i++) {
    hearts.push(createHeartPart());
}

function getHeartPoint(angle, size) {
    const x = 16 * Math.pow(Math.sin(angle), 3);
    const y = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
    return { x: x * size, y: y * size };
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    hearts.forEach((h) => {
        if (stage === 0) {
            h.x += h.vx;
            h.y += h.vy;
            if (h.x < 0 || h.x > canvas.width) h.vx *= -1;
            if (h.y < 0 || h.y > canvas.height) h.vy *= -1;
        } else {
            const target = getHeartPoint(h.targetAngle, heartSize);
            const tx = centerX + target.x;
            const ty = centerY + target.y;
            
            h.x += (tx - h.x) * 0.08;
            h.y += (ty - h.y) * 0.08;

            // Постійне переливання без зупинки
            if (Math.random() > 0.94) {
                h.emoji = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            }
        }
        
        ctx.font = `${heartSize + 4}px serif`;
        ctx.fillText(h.emoji, h.x, h.y);
    });

    requestAnimationFrame(animate);
}

animate();

// --- ЛОГІКА ПОДІЙ ---

// 1. Початок збору
setTimeout(() => {
    stage = 1;
    document.getElementById("centerText").style.opacity = 1;
}, 1000);

// 2. Напис зникає
setTimeout(() => {
    document.getElementById("centerText").style.opacity = 0;
}, 2800);

// 3. Серце летить у кут та стає трохи нижче
setTimeout(() => {
    stage = 2;
    centerX = 120; 
    centerY = 130; // Опущено нижче від верхнього краю
    heartSize = 9; 
}, 3300);

// 4. Друк тексту та заповнення серця
setTimeout(() => {
    isTypingStarted = true;
    // Додаємо більше сердечок для ефекту "заповнення" при друці
    for(let i=0; i<150; i++) {
        let newH = createHeartPart();
        newH.x = centerX;
        newH.y = centerY;
        hearts.push(newH);
    }
    typeText();
}, 4500);

const textContent = `Сьогодні восьме березня!
Це чудовий весняний день, і я бажаю тобі, щоб у твоєму житті все було прекрасно.

Нехай лагідне сонце освітлює твій шлях не тільки сьогодні, а й кожного наступного дня. Будь щаслива, усміхнена і нехай весь твій шлях життя буде світлим, гарним і чудовим як і ти, сонце, Вітаю! ✨`;

let pos = 0;
function typeText() {
    if (pos < textContent.length) {
        document.getElementById("message").textContent += textContent[pos];
        pos++;
        setTimeout(typeText, 45);
    }
}

window.onresize = () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    if (stage === 1) {
        centerX = canvas.width / 2;
        centerY = canvas.height / 2;
    }
};
</script>

</body>
</html>
