<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>З 8 Березня!</title>
    <style>
        body {
            background: black;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        canvas { position: absolute; top: 0; left: 0; }
        
        /* Заголовок, який швидко зникає */
        #centerText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            color: white; /* Змінено на білий */
            opacity: 0;
            transition: opacity 0.3s; /* Швидке зникнення */
            text-align: center;
            pointer-events: none;
        }

        /* Блок для привітання під серцем */
        #message {
            position: absolute;
            top: 180px; /* Нижче зменшеного серця */
            left: 30px;
            width: 450px;
            font-size: 18px;
            line-height: 1.6;
            color: white; /* Білий текст */
            white-space: pre-line;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="centerText">З 8 Березня! 🌸</div>
<div id="message"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hearts = [];
const heartCount = 300; 
let centerX = canvas.width / 2;
let centerY = canvas.height / 2;
let heartSize = 15; // Початковий розмір
let isFinished = false; // Чи закінчився текст

const heartEmojis = ["❤️", "💖", "💝", "💕", "💗", "💓"];
let stage = 0; 

for (let i = 0; i < heartCount; i++) {
    hearts.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 4,
        vy: (Math.random() - 0.5) * 4,
        targetAngle: (i / heartCount) * Math.PI * 2,
        emoji: "❤️" // Початковий колір
    });
}

function getHeartPoint(angle, size) {
    const x = 16 * Math.pow(Math.sin(angle), 3);
    const y = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
    return { x: x * size, y: y * size };
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    hearts.forEach((h, index) => {
        if (stage === 0) {
            h.x += h.vx;
            h.y += h.vy;
            if (h.x < 0 || h.x > canvas.width) h.vx *= -1;
            if (h.y < 0 || h.y > canvas.height) h.vy *= -1;
        } else {
            const target = getHeartPoint(h.targetAngle, heartSize);
            const tx = centerX + target.x;
            const ty = centerY + target.y;
            
            h.x += (tx - h.x) * 0.07;
            h.y += (ty - h.y) * 0.07;

            // Ефект переливання (зміна емодзі), поки текст не закінчився
            if (!isFinished && Math.random() > 0.95) {
                h.emoji = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            } else if (isFinished) {
                h.emoji = "❤️"; // Зупиняємо на червоному
            }
        }
        
        ctx.font = `${heartSize + 2}px serif`;
        ctx.fillText(h.emoji, h.x, h.y);
    });

    requestAnimationFrame(animate);
}

animate();

// --- ТАЙМІНГИ ТА ЛОГІКА ---

// 1. Показуємо текст у центрі
setTimeout(() => {
    document.getElementById("centerText").style.opacity = 1;
    stage = 1;
}, 500);

// 2. Текст швидко зникає ДО переміщення
setTimeout(() => {
    document.getElementById("centerText").style.opacity = 0;
}, 2500);

// 3. Серце зменшується і летить у кут
setTimeout(() => {
    centerX = 100;
    centerY = 80;
    heartSize = 8; // Зменшуємо розмір серця
}, 3000);

// 4. Починаємо друкувати привітання
setTimeout(typeText, 4000);

const textContent = `Сьогодні восьме березня! 
Це чудовий весняний день, і я бажаю тобі, щоб у твоєму житті все було прекрасно. 

Нехай лагідне сонце освітлює твій шлях не тільки сьогодні, а й кожного наступного дня. Будь щаслива, усміхнена і нехай кожен твій день буде схожий на свято! Вітаю! 🌸✨`;

let pos = 0;
function typeText() {
    if (pos < textContent.length) {
        document.getElementById("message").textContent += textContent[pos];
        pos++;
        setTimeout(typeText, 40);
    } else {
        isFinished = true; // Текст закінчився -> серце стає червоним
    }
}
</script>

</body>
</html>
