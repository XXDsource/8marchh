<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>8 Березня</title>

<style>

body{
background:black;
margin:0;
overflow:hidden;
font-family:sans-serif;
color:white;
}

canvas{
position:absolute;
}

#centerText{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
color:red;
opacity:0;
transition:1s;
}

#message{
position:absolute;
top:20px;
left:20px;
width:400px;
font-size:20px;
white-space:pre-line;
}

</style>

</head>

<body>

<canvas id="canvas"></canvas>

<div id="centerText">З 8 березням 🌸</div>
<div id="message"></div>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let hearts=[]
let centerX=canvas.width/2
let centerY=canvas.height/2

for(let i=0;i<300;i++){
hearts.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height
})
}

let progress=0

function drawHeart(x,y){
ctx.font="20px serif"
ctx.fillText("❤️",x,y)
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

progress+=0.01

for(let i=0;i<hearts.length;i++){

let angle=i*0.2

let targetX=centerX + 16*Math.pow(Math.sin(angle),3)*15
let targetY=centerY - (13*Math.cos(angle)-5*Math.cos(2*angle)-2*Math.cos(3*angle)-Math.cos(4*angle))*15

hearts[i].x+=(targetX-hearts[i].x)*progress
hearts[i].y+=(targetY-hearts[i].y)*progress

drawHeart(hearts[i].x,hearts[i].y)

}

if(progress<1){
requestAnimationFrame(animate)
}else{

document.getElementById("centerText").style.opacity=1

setTimeout(moveHeart,3000)

}

}

function moveHeart(){

centerX=120
centerY=120

setTimeout(typeText,1000)

}

let text=`Сьогодні восьме березня
Це чудовий день і в цей день я бажаю тобі щоб у тобі все було чудово щоб свіже гарне сонце світило тобі в небо висвітлювало шлях твоєї життєвої дороги і нехай це сонечко висвітлює тобі твій шлях не тільки восьмого березня а й дев'ятого і десятого і так далі, нехай усе твоє життя шлях буде світлим, вітаю з восьмим березнем сонечко`

let i=0

function typeText(){

if(i<text.length){

document.getElementById("message").textContent+=text[i]

i++

setTimeout(typeText,40)

}

}

animate()

</script>

</body>
</html>
