<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>З 8 Березня!</title>
    <style>
        body {
            background: #000;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        canvas { position: absolute; top: 0; left: 0; }
        #centerText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            color: #ff4d4d;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
            pointer-events: none;
        }
        #message {
            position: absolute;
            top: 150px;
            left: 30px;
            width: 350px;
            font-size: 18px;
            line-height: 1.6;
            white-space: pre-line;
            color: #ffcccc;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="centerText">З 8 Березня! 🌸</div>
<div id="message"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hearts = [];
let centerX = canvas.width / 2;
let centerY = canvas.height / 2;
let targetCenterX = centerX;
let targetCenterY = centerY;
let progress = 0; // 0: хаос, 1: формування серця, 2: текст
let state = "scatter"; // scatter, form, move, text

// Створення частинок
for (let i = 0; i < 250; i++) {
    hearts.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 4,
        vy: (Math.random() - 0.5) * 4,
        angle: (i / 250) * Math.PI * 2 // для форми серця
    });
}

function drawHeartIcon(x, y) {
    ctx.font = "16px serif";
    ctx.fillText("❤️", x, y);
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    hearts.forEach((h, index) => {
        if (state === "scatter") {
            h.x += h.vx;
            h.y += h.vy;
            // Відштовхування від стінок
            if (h.x < 0 || h.x > canvas.width) h.vx *= -1;
            if (h.y < 0 || h.y > canvas.height) h.vy *= -1;
        } 
        else if (state === "form" || state === "move") {
            // Математична формула серця
            let a = h.angle;
            let tx = targetCenterX + 16 * Math.pow(Math.sin(a), 3) * 13;
            let ty = targetCenterY - (13 * Math.cos(a) - 5 * Math.cos(2 * a) - 2 * Math.cos(3 * a) - Math.cos(4 * a)) * 13;
            
            h.x += (tx - h.x) * 0.05;
            h.y += (ty - h.y) * 0.05;
        }
        drawHeartIcon(h.x, h.y);
    });

    if (state === "scatter" && Date.now() - startTime > 2000) {
        state = "form";
        document.getElementById("centerText").style.opacity = 1;
        setTimeout(() => { state = "move"; targetCenterX = 100; targetCenterY = 100; }, 3000);
        setTimeout(() => { startTyping(); }, 4500);
    }

    requestAnimationFrame(animate);
}

const startTime = Date.now();
animate();

/* ---------- ЕФЕКТ ТЕКСТУ ---------- */
const fullText = `Сьогодні восьме березня! 
Це чудовий день, і я бажаю тобі, щоб у всьому панувала гармонія. Нехай яскраве сонце освітлює твій шлях не тільки сьогодні, а й кожного наступного дня. 

Нехай все твоє життя буде сповнене тепла та усмішок. Вітаю! ✨`;

let pos = 0;
function startTyping() {
    if (pos < fullText.length) {
        document.getElementById("message").textContent += fullText[pos];
        pos++;
        setTimeout(startTyping, 40);
    }
}

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    if (state !== "move") {
        targetCenterX = canvas.width / 2;
        targetCenterY = canvas.height / 2;
    }
});
</script>

</body>
</html>
